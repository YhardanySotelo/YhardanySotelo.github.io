<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sotelo — Digital Craftsman</title>
<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- ════ GLOBAL SVG DEFS — gradients defined once, referenced everywhere ════ -->
<svg width="0" height="0" style="position:absolute;overflow:hidden;" aria-hidden="true">
  <defs>
    <linearGradient id="sic-about" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse"><stop stop-color="#5E5CE6"/><stop offset="1" stop-color="#BF5AF2"/></linearGradient>
    <linearGradient id="sic-projects" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse"><stop stop-color="#34C759"/><stop offset="1" stop-color="#30D158"/></linearGradient>
    <linearGradient id="sic-services" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse"><stop stop-color="#FF9500"/><stop offset="1" stop-color="#FF6B00"/></linearGradient>
    <linearGradient id="sic-gallery" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse"><stop stop-color="#FFD60A"/><stop offset="1" stop-color="#FF9F0A"/></linearGradient>
    <linearGradient id="sic-contact" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse"><stop stop-color="#64D2FF"/><stop offset="1" stop-color="#0A84FF"/></linearGradient>
    <linearGradient id="sic-philosophy" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse"><stop stop-color="#BF5AF2"/><stop offset="1" stop-color="#5E5CE6"/></linearGradient>
    <linearGradient id="sic-ipod" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse"><stop stop-color="#FF2D55"/><stop offset="1" stop-color="#AF52DE"/></linearGradient>
    <linearGradient id="sic-saykyo" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse"><stop stop-color="#30D158"/><stop offset="1" stop-color="#007AFF"/></linearGradient>
    <linearGradient id="sic-game" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse"><stop stop-color="#30D158"/><stop offset="1" stop-color="#34C759"/></linearGradient>
  </defs>
</svg>

<!-- ════ CURSOR GLOW ════ -->
<div id="cursor-glow"></div>

<!-- ════ PARTICLES ════ -->
<div id="particles"></div>

<!-- ════ BOOT ════ -->
<div id="boot">
  <!-- Sotelo S logo — stylized minimal -->
  <svg class="boot-logo" width="52" height="68" viewBox="0 0 100 130" fill="none">
    <path d="M72 28 C72 16 62 8 50 8 C36 8 24 18 24 32 C24 46 34 52 50 58 C66 64 78 70 78 86 C78 100 66 122 46 122 C32 122 20 112 20 98" stroke="white" stroke-width="9" stroke-linecap="round" fill="none"/>
  </svg>
  <div class="boot-bar-track"><div class="boot-fill" id="boot-fill"></div></div>
  <div class="boot-ver">Sotelo OS 1.0 — Tunja, Boyacá</div>
</div>

<!-- ════ WALLPAPER ════ -->
<div id="wall">
  <div id="wall-base"></div>
  <div id="wall-orbs">
    <div class="orb orb1"></div><div class="orb orb2"></div>
    <div class="orb orb3"></div><div class="orb orb4"></div>
  </div>
  <div id="wall-grain"></div>
</div>

<!-- ════ MENU BAR ════ -->
<div id="menubar">
  <div class="mb-apple-btn" onclick="toggleSpot()">
    <svg width="16" height="20" viewBox="0 0 100 130" fill="none">
      <path d="M72 28 C72 16 62 8 50 8 C36 8 24 18 24 32 C24 46 34 52 50 58 C66 64 78 70 78 86 C78 100 66 122 46 122 C32 122 20 112 20 98" stroke="rgba(0,0,0,.8)" stroke-width="12" stroke-linecap="round" fill="none"/>
    </svg>
  </div>
  <span class="mb-appname" id="mb-appname">Finder</span>
  <span class="mb-item">Archivo</span>
  <span class="mb-item">Editar</span>
  <span class="mb-item">Ir</span>
  <span class="mb-item">Ventana</span>
  <div class="mb-right">
    <!-- WiFi SVG -->
    <div class="mb-statusbtn">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 10.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3z" fill="rgba(0,0,0,.8)"/>
        <path d="M4.5 7.5C5.5 6.3 6.7 5.5 8 5.5s2.5.8 3.5 2" stroke="rgba(0,0,0,.8)" stroke-width="1.3" stroke-linecap="round" fill="none"/>
        <path d="M1.5 4.5C3.2 2.5 5.5 1.2 8 1.2s4.8 1.3 6.5 3.3" stroke="rgba(0,0,0,.8)" stroke-width="1.3" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <!-- Battery SVG -->
    <div class="mb-statusbtn">
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
        <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="rgba(0,0,0,.35)" stroke-width="1"/>
        <rect x="22" y="3.5" width="2.5" height="5" rx="1.5" fill="rgba(0,0,0,.35)"/>
        <rect x="2" y="2" width="16" height="8" rx="2" fill="#34c759"/>
      </svg>
    </div>
    <span class="mb-clock" id="mb-clock">--:--</span>
  </div>
</div>

<!-- ════ DESKTOP ICONS ════ -->
<div id="desktop"></div>

<!-- ════ WINDOWS ════ -->
<div id="win-layer"></div>

<!-- ════ DOCK ════ -->
<div id="dock" id="dock-bar"></div>

<!-- ════ SPOTLIGHT ════ -->
<div id="spotlight">
  <div class="spot-box">
    <div class="spot-row">
      <svg class="spot-q-ic" viewBox="0 0 20 20" fill="none">
        <circle cx="8.5" cy="8.5" r="5.5" stroke="rgba(0,0,0,.5)" stroke-width="1.5"/>
        <path d="M13 13l4 4" stroke="rgba(0,0,0,.5)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input id="spot-q" type="text" placeholder="Buscar…" autocomplete="off" spellcheck="false">
    </div>
    <div class="spot-results" id="spot-res"></div>
  </div>
</div>

<!-- ════ CONTEXT MENU ════ -->
<div id="ctx"></div>

<!-- ════ NOTIFICATION ════ -->
<div id="notif">
  <div class="notif-ic" id="notif-ic"></div>
  <div>
    <div class="notif-title" id="notif-title">Sotelo OS</div>
    <div class="notif-msg" id="notif-msg">Bienvenido</div>
  </div>
  <div class="notif-time">ahora</div>
</div>

<!-- ════ iOS UI ════ -->
<div id="ios-ui">
  <!-- Dynamic Island -->
  <div class="ios-dynamic-island">
    <div class="di-camera"></div>
    <div class="di-dot"></div>
    <div class="di-camera"></div>
  </div>
  <!-- Status Bar -->
  <div class="ios-sb">
    <span class="ios-sb-time" id="ios-time">9:41</span>
    <div class="ios-sb-right">
      <!-- Signal bars SVG -->
      <svg width="17" height="12" viewBox="0 0 17 12" fill="white">
        <rect x="0"  y="8"  width="3" height="4" rx="1" opacity=".4"/>
        <rect x="4"  y="5"  width="3" height="7" rx="1" opacity=".6"/>
        <rect x="8"  y="2"  width="3" height="10" rx="1" opacity=".8"/>
        <rect x="12" y="0"  width="3" height="12" rx="1"/>
      </svg>
      <!-- Battery SVG iOS -->
      <svg width="27" height="13" viewBox="0 0 27 13" fill="none">
        <rect x=".5" y=".5" width="23" height="12" rx="3.5" stroke="rgba(255,255,255,.5)" stroke-width="1"/>
        <rect x="24" y="4" width="2.5" height="5" rx="1.5" fill="rgba(255,255,255,.4)"/>
        <rect x="2" y="2" width="18" height="9" rx="2" fill="white"/>
      </svg>
    </div>
  </div>
  <div class="ios-pages" id="ios-pages"></div>
  <div class="ios-dots" id="ios-dots"></div>
  <div class="ios-dock" id="ios-dock"></div>
</div>

<!-- ════ iOS SHEET ════ -->
<div id="ios-sheet">
  <div class="ios-card">
    <div class="ios-card-handle"></div>
    <div class="ios-card-bar">
      <span class="ios-card-title" id="sheet-title"></span>
      <div class="ios-card-close" onclick="closeSheet()">✕</div>
    </div>
    <div class="ios-card-body" id="sheet-body"></div>
  </div>
</div>

<!-- ════ LIGHTBOX ════ -->
<div id="lightbox">
  <img id="lb-img" src="" alt="">
  <button id="lb-close" onclick="closeLB()">✕</button>
  <button class="lb-nav" id="lb-prev" onclick="lbNav(-1)">‹</button>
  <button class="lb-nav" id="lb-next" onclick="lbNav(1)">›</button>
  <div id="lb-caption"></div>
</div>
<script src="main.js"></script>
</body>
</html>
